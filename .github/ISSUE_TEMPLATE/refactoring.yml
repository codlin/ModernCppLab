name: Refactoring
description: 重构、模块迁移、代码结构调整
title: "[Refactoring] "
labels: ["type: refactoring"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 当前问题
      description: 现有结构有什么问题？为什么需要重构？
    validations:
      required: true

  - type: textarea
    id: target
    attributes:
      label: 目标结构
      description: 重构后应该变成什么样？
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 迁移步骤
      value: |
        1.
        2.
        3.

  - type: textarea
    id: affected
    attributes:
      label: 影响范围
      value: |
        受影响文件：
        - `include/...`
        - `src/...`
        - `CMakeLists.txt`
        - `tests/...`（如存在）

  - type: textarea
    id: risks
    attributes:
      label: 风险与回滚
      value: |
        风险：
        回滚方式：
        回滚难度：低 / 中 / 高

  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      value: |
        - [ ] 编译通过（`cmake --build cmake-build-default`）
        - [ ] 行为不变（无功能回归）
        - [ ] （如有测试）`ctest` 通过
        - [ ] 相关文档已更新

  - type: textarea
    id: docs
    attributes:
      label: 相关文档
      value: |
        - `docs/github-mcp-workflow.md`

  - type: textarea
    id: next-action
    attributes:
      label: 下一步
    validations:
      required: true

  - type: textarea
    id: resume-note
    attributes:
      label: 恢复现场
    validations:
      required: true
